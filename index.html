<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IME QUIZ · Enem</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e3f2fd 0%, #b3d9f0 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      max-width: 1100px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 25px 50px rgba(0, 60, 100, 0.20);
      padding: 2.5rem 2.8rem;
      border: 1px solid rgba(180, 215, 240, 0.4);
    }

    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand h1 {
      font-size: 3.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0b4b6b 0%, #2a7fa0 80%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      padding: 0 0.5rem;
      border-bottom: 4px solid #a0d0e9;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }
    .brand h1 small {
      font-size: 1.2rem;
      font-weight: 300;
      -webkit-text-fill-color: #3b7a9a;
      margin-left: 10px;
      letter-spacing: 2px;
    }

    .nav-area {
      margin-bottom: 2rem;
    }
    .discipline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .discipline-btn {
      background: #f0f9ff;
      border: 2px solid #c5e0f0;
      border-radius: 60px;
      padding: 0.8rem 0.3rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #063f58;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      position: relative;
      overflow: hidden;
    }
    .discipline-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 3px;
      background: #2a7fa0;
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    .discipline-btn:hover::after {
      width: 60%;
    }
    .discipline-btn:hover {
      background: #dcecf7;
      border-color: #6faecf;
      transform: translateY(-3px);
      box-shadow: 0 8px 16px rgba(30, 130, 180, 0.15);
    }
    .discipline-btn.active {
      background: #c7e5f5;
      border-color: #3f8fb5;
      box-shadow: 0 6px 18px rgba(30, 130, 180, 0.25);
      transform: translateY(-3px);
    }
    .discipline-btn.active::after {
      width: 70%;
    }

    .sub-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
      background: #f5fafe;
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      border: 1px solid #d6eaf5;
      margin-top: 0.3rem;
      min-height: 3.6rem;
      align-items: center;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }
    .sub-grid-label {
      font-weight: 600;
      color: #1a5e7a;
      margin-right: 0.5rem;
      font-size: 0.95rem;
    }
    .sub-btn {
      background: transparent;
      border: 2px solid transparent;
      border-radius: 40px;
      padding: 0.4rem 1.6rem;
      font-weight: 500;
      font-size: 0.9rem;
      color: #144f6b;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .sub-btn:hover {
      background: #e0eff9;
      border-color: #95c2db;
      transform: scale(1.04);
    }
    .sub-btn.active-sub {
      background: #c7e5f5;
      border-color: #3f8fb5;
      font-weight: 600;
      color: #043e55;
      box-shadow: 0 2px 10px rgba(30, 130, 180, 0.15);
      transform: scale(1.04);
    }

    .question-card {
      background: #fafffe;
      border-radius: 36px;
      padding: 2.2rem 2.6rem;
      margin-bottom: 1.8rem;
      border: 1px solid #d6eaf5;
      box-shadow: 0 8px 24px rgba(30, 100, 140, 0.08);
      transition: box-shadow 0.3s ease;
    }
    .question-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0b4058;
      line-height: 1.5;
      margin-bottom: 1.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px dashed #b8d8ec;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .option-item {
      background: #f5fbfe;
      border-radius: 40px;
      border: 2px solid #d2e6f2;
      padding: 1rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
    }
    .option-item:hover:not(.disabled) {
      background: #e9f4fc;
      border-color: #8ac0db;
      transform: translateX(6px);
      box-shadow: 0 4px 12px rgba(30, 130, 180, 0.10);
    }
    .option-item.disabled {
      cursor: default;
      opacity: 0.9;
    }
    .option-item input[type="radio"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #1585b3;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .option-item.disabled input[type="radio"] {
      cursor: default;
    }
    .option-item label {
      font-size: 1.1rem;
      font-weight: 500;
      color: #144f6b;
      cursor: pointer;
      flex: 1;
    }
    .option-item.disabled label {
      cursor: default;
    }

    .option-item.correct {
      background: #d4edda;
      border-color: #28a745;
      box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.25);
      transform: scale(1.02);
      transition: all 0.3s ease;
    }
    .option-item.wrong {
      background: #f8d7da;
      border-color: #dc3545;
      box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.25);
      transition: all 0.3s ease;
    }
    .option-item.show-correct {
      background: #d4edda;
      border-color: #28a745;
      box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.25);
      transform: scale(1.02);
      transition: all 0.3s ease;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      margin-top: 0.6rem;
    }
    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: #c7e5f5;
      border: none;
      border-radius: 60px;
      padding: 0.8rem 2.4rem;
      font-weight: 600;
      font-size: 1rem;
      color: #063f58;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid #a2cde3;
      box-shadow: 0 4px 10px rgba(0, 70, 120, 0.06);
    }
    .btn-primary:hover {
      background: #b3daf0;
      border-color: #66aaca;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(30, 130, 180, 0.20);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-check {
      background: #0b6f94;
      border: none;
      padding: 0.8rem 2.6rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 6px 18px rgba(10, 90, 130, 0.25);
      border: 1px solid #479bc0;
    }
    .btn-check:hover {
      background: #0a6183;
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(10, 90, 130, 0.35);
    }
    .btn-check:active {
      transform: translateY(0);
    }
    .btn-check:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none;
    }
    .btn-reset {
      background: transparent;
      border: 2px solid #98c5dd;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      color: #1a5d79;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-reset:hover {
      background: #e5f1f9;
      border-color: #589fc0;
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(30, 130, 180, 0.12);
    }
    .counter {
      font-size: 0.95rem;
      color: #2f7897;
      font-weight: 500;
      background: #eaf4fa;
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.04);
    }

    .feedback-box {
      margin-top: 1.8rem;
      padding: 1.2rem 2rem;
      border-radius: 60px;
      background: #e6f2fa;
      border-left: 8px solid #3f95bb;
      font-size: 1.05rem;
      font-weight: 500;
      color: #04415a;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
      transition: all 0.3s ease;
    }
    .feedback-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .feedback-badge {
      font-weight: 700;
      padding: 0.25rem 1.8rem;
      border-radius: 40px;
    }
    .feedback-badge.acertou {
      background: #b2e0c0;
      color: #06653b;
    }
    .feedback-badge.errou {
      background: #fad1d1;
      color: #a12222;
    }
    .feedback-correct {
      background: #d9ecf5;
      padding: 0.15rem 1.4rem;
      border-radius: 40px;
      font-weight: 600;
      color: #025074;
    }
    .feedback-explication {
      background: #f2f9ff;
      padding: 0.8rem 1.6rem;
      border-radius: 30px;
      font-weight: 400;
      color: #013249;
      border-left: 4px solid #5ba3c7;
      margin-top: 0.2rem;
      font-size: 0.98rem;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    @media (max-width: 650px) {
      .app { padding: 1.8rem 1.2rem; }
      .brand h1 { font-size: 2.4rem; }
      .question-text { font-size: 1.25rem; }
      .discipline-grid { grid-template-columns: repeat(2, 1fr); }
      .sub-grid { flex-direction: column; align-items: stretch; gap: 0.3rem; padding: 0.8rem 1rem; }
      .option-item { padding: 0.7rem 1rem; }
      .feedback-box { padding: 1rem 1.2rem; }
    }
    @media (max-width: 420px) {
      .brand h1 { font-size: 2rem; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .btn-group { justify-content: center; }
      .question-card { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <div class="brand">
    <h1>IME QUIZ <small>Enem</small></h1>
  </div>

  <div class="nav-area">
    <div class="discipline-grid" id="disciplineGrid">
      <button class="discipline-btn" data-area="linguagens">📖 Linguagens</button>
      <button class="discipline-btn" data-area="humanas">🌍 Humanas</button>
      <button class="discipline-btn" data-area="natureza">🔬 Natureza</button>
      <button class="discipline-btn" data-area="matematica">📐 Matemática</button>
    </div>
    <div class="sub-grid" id="subGrid">
      <span class="sub-grid-label">📌 Matéria:</span>
    </div>
  </div>

  <div class="question-card">
    <div class="question-text" id="questionDisplay">Selecione uma área e matéria</div>
    <div class="options-grid" id="optionsContainer"></div>
  </div>

  <div class="action-bar">
    <div class="btn-group">
      <button class="btn-primary" id="nextBtn">⏩ Próxima</button>
      <button class="btn-reset" id="resetBtn">↻ Reiniciar</button>
    </div>
    <span class="counter" id="counter">0 / 0</span>
  </div>

  <div class="feedback-box" id="feedbackBox">
    <div class="feedback-row">
      <span id="feedbackEmoji">💡</span>
      <span id="feedbackMessage">Clique em uma alternativa para responder</span>
    </div>
    <div id="feedbackExplication" class="feedback-explication" style="display: none;"></div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ========== BANCO DE QUESTÕES ==========
    const bank = {
      linguagens: {
        'Língua Portuguesa': [
          { pergunta: 'Qual é a função da linguagem predominante em uma placa de "PARE"?', opcoes: ['Fática', 'Conativa', 'Emotiva', 'Metalinguística'], correta: 1, explicacao: 'A função conativa (apelativa) tem o objetivo de influenciar o receptor, como em ordens e instruções.' },
          { pergunta: 'Em "O vento sussurrava segredos", qual figura de linguagem está presente?', opcoes: ['Metáfora', 'Prosopopeia', 'Comparação', 'Eufemismo'], correta: 1, explicacao: 'Prosopopeia (personificação) atribui ações humanas a seres inanimados.' },
          { pergunta: 'O que é uma crônica?', opcoes: ['Narrativa longa e fictícia', 'Texto teatral', 'Narrativa curta sobre o cotidiano', 'Poema épico'], correta: 2, explicacao: 'A crônica é um gênero textual curto que aborda o cotidiano com tom leve e reflexivo.' },
          { pergunta: 'Qual é a diferença entre a fala e a escrita?', opcoes: ['A fala é mais informal e espontânea', 'A escrita é sempre mais correta', 'Não há diferenças', 'A fala usa mais advérbios'], correta: 0, explicacao: 'A fala é geralmente mais informal, espontânea e com marcas de oralidade, enquanto a escrita segue normas mais rígidas.' },
          { pergunta: 'O que é um estrangeirismo?', opcoes: ['Palavra de origem estrangeira incorporada ao idioma', 'Palavra inventada', 'Gíria', 'Regionalismo'], correta: 0, explicacao: 'Estrangeirismo é o uso de palavras oriundas de outras línguas, como "mouse" e "show".' },
          { pergunta: 'Qual é o gênero textual de uma receita culinária?', opcoes: ['Descritivo', 'Injuntivo', 'Narrativo', 'Argumentativo'], correta: 1, explicacao: 'A receita é um texto injuntivo, pois orienta o leitor a executar uma ação passo a passo.' },
          { pergunta: 'O que são variações linguísticas?', opcoes: ['Diferentes formas de falar um mesmo idioma', 'Erros de português', 'Palavras estrangeiras', 'Dialetos regionais'], correta: 0, explicacao: 'Variações linguísticas são as diferentes formas de usar a língua, influenciadas por região, classe social, idade, etc.' },
          { pergunta: 'Qual é a função da linguagem predominante em um poema lírico?', opcoes: ['Referencial', 'Emotiva', 'Conativa', 'Fática'], correta: 1, explicacao: 'A função emotiva (expressiva) está centrada no emissor, expressando emoções e sentimentos.' },
          { pergunta: 'O que é coesão textual?', opcoes: ['Uso de conectivos para ligar ideias', 'Organização das ideias no texto', 'Uso de palavras bonitas', 'Correção gramatical'], correta: 0, explicacao: 'Coesão textual é o uso de elementos linguísticos (conectivos, pronomes) que garantem a ligação entre as partes do texto.' },
          { pergunta: 'Qual é a diferença entre denotação e conotação?', opcoes: ['Denotação é o sentido literal; conotação é o sentido figurado', 'Denotação é formal; conotação é informal', 'Não há diferença', 'Denotação é subjetiva'], correta: 0, explicacao: 'Denotação é o sentido objetivo e literal da palavra; conotação é o sentido figurado, subjetivo.' },
          { pergunta: 'O que é um texto argumentativo?', opcoes: ['Texto que defende uma tese', 'Texto que conta uma história', 'Texto que descreve um objeto', 'Texto que dá instruções'], correta: 0, explicacao: 'O texto argumentativo tem como objetivo defender um ponto de vista, apresentando argumentos e evidências.' },
          { pergunta: 'Qual é a importância da leitura crítica?', opcoes: ['Entender o texto superficialmente', 'Interpretar e analisar o texto com profundidade', 'Decorar o texto', 'Ler rapidamente'], correta: 1, explicacao: 'A leitura crítica envolve analisar, interpretar e questionar o texto, indo além da compreensão superficial.' },
          { pergunta: 'O que é um período composto?', opcoes: ['Frase com mais de uma oração', 'Frase com uma oração', 'Frase sem verbo', 'Frase interrogativa'], correta: 0, explicacao: 'Período composto é aquele que possui duas ou mais orações, podendo ser por coordenação ou subordinação.' },
          { pergunta: 'Qual é a função da pontuação?', opcoes: ['Organizar o texto e indicar pausas', 'Enfeitar o texto', 'Substituir palavras', 'Indicar emoções'], correta: 0, explicacao: 'A pontuação organiza o texto, indica pausas, entonação e ajuda na compreensão da mensagem.' },
          { pergunta: 'O que é um neologismo?', opcoes: ['Palavra nova criada em uma língua', 'Palavra antiga', 'Gíria', 'Regionalismo'], correta: 0, explicacao: 'Neologismo é a criação de uma nova palavra ou a atribuição de um novo sentido a uma palavra existente.' },
          { pergunta: 'Qual é a diferença entre homônimos e parônimos?', opcoes: ['Homônimos têm mesma grafia; parônimos têm sons parecidos', 'Homônimos têm sons parecidos; parônimos têm mesma grafia', 'Não há diferença', 'Homônimos são antônimos'], correta: 0, explicacao: 'Homônimos são palavras com mesma grafia ou som (ex: "manga"), parônimos têm sons parecidos (ex: "emergir/imergir").' },
          { pergunta: 'O que é um texto dissertativo?', opcoes: ['Texto que expõe ideias sobre um tema', 'Texto que conta uma história', 'Texto que descreve algo', 'Texto que dá instruções'], correta: 0, explicacao: 'O texto dissertativo expõe ideias, reflexões e argumentos sobre um determinado tema.' },
          { pergunta: 'Qual é a função do artigo na língua portuguesa?', opcoes: ['Determinar o substantivo', 'Substituir o substantivo', 'Modificar o adjetivo', 'Indicar ação'], correta: 0, explicacao: 'O artigo determina o substantivo, indicando gênero, número e se é definido ou indefinido.' },
          { pergunta: 'O que é uma oração subordinada?', opcoes: ['Oração que depende de outra para ter sentido', 'Oração independente', 'Oração sem verbo', 'Oração interrogativa'], correta: 0, explicacao: 'A oração subordinada é aquela que exerce função sintática em relação a uma oração principal.' },
          { pergunta: 'Qual é a importância da norma culta?', opcoes: ['Padronizar a língua para situações formais', 'Substituir a língua falada', 'Criar novas palavras', 'Nenhuma importância'], correta: 0, explicacao: 'A norma culta é importante para a comunicação em contextos formais, como textos acadêmicos e profissionais.' }
        ],
        'Literatura': [
          { pergunta: 'Quem escreveu "Dom Casmurro"?', opcoes: ['Machado de Assis', 'José de Alencar', 'Carlos Drummond', 'Clarice Lispector'], correta: 0, explicacao: '"Dom Casmurro" é uma obra de Machado de Assis, publicada em 1899.' },
          { pergunta: 'O Romantismo brasileiro teve como marco inicial qual obra?', opcoes: ['"Iracema"', '"Suspiros Poéticos"', '"O Guarani"', '"Os Lusíadas"'], correta: 1, explicacao: '"Suspiros Poéticos e Saudades", de Gonçalves de Magalhães, é considerado o marco do Romantismo no Brasil.' },
          { pergunta: 'Qual poeta é conhecido como "Poeta dos Escravos"?', opcoes: ['Castro Alves', 'Gonçalves Dias', 'Álvares de Azevedo', 'Casimiro de Abreu'], correta: 0, explicacao: 'Castro Alves é chamado de "Poeta dos Escravos" por sua luta contra a escravidão em poemas como "Navio Negreiro".' },
          { pergunta: 'O Modernismo brasileiro começou com a Semana de Arte Moderna em qual ano?', opcoes: ['1922', '1930', '1945', '1910'], correta: 0, explicacao: 'A Semana de Arte Moderna de 1922 foi o marco inicial do Modernismo no Brasil.' },
          { pergunta: 'Qual obra pertence ao Barroco brasileiro?', opcoes: ['"O Guarani"', '"Prosopopeia"', '"Carta de Pero Vaz"', '"Os Lusíadas"'], correta: 1, explicacao: '"Prosopopeia", de Bento Teixeira, é uma obra do Barroco no Brasil.' },
          { pergunta: 'O movimento literário que valorizava o "eu" e a subjetividade é o:', opcoes: ['Realismo', 'Romantismo', 'Parnasianismo', 'Simbolismo'], correta: 1, explicacao: 'O Romantismo valorizava o "eu", a subjetividade e os sentimentos, em oposição ao racionalismo.' },
          { pergunta: 'Quem escreveu "Morte e Vida Severina"?', opcoes: ['João Cabral de Melo Neto', 'Carlos Drummond', 'Manuel Bandeira', 'Cecília Meireles'], correta: 0, explicacao: '"Morte e Vida Severina" é um poema de João Cabral de Melo Neto, sobre a vida no Nordeste.' },
          { pergunta: 'A obra "Vidas Secas" é de qual autor?', opcoes: ['Graciliano Ramos', 'José Lins do Rego', 'Euclides da Cunha', 'Guimarães Rosa'], correta: 0, explicacao: '"Vidas Secas" é um romance de Graciliano Ramos, que retrata a vida no sertão nordestino.' },
          { pergunta: 'O que caracteriza a poesia concreta?', opcoes: ['Métrica fixa', 'Exploração visual das palavras', 'Sentimentalismo', 'Narrativa longa'], correta: 1, explicacao: 'A poesia concreta explora a disposição visual das palavras no espaço, rompendo com a métrica tradicional.' },
          { pergunta: 'O Parnasianismo é marcado pelo:', opcoes: ['Subjetivismo', 'Objetivismo e descrições', 'Versos livres', 'Nacionalismo'], correta: 1, explicacao: 'O Parnasianismo valorizava a objetividade, a descrição e a forma perfeita, com métrica e rima rigorosas.' },

    let currentArea = 'linguagens';
    let currentSub = 'Língua Portuguesa';

    // DOM
    const disciplineBtns = document.querySelectorAll('.discipline-btn');
    const subGrid = document.getElementById('subGrid');
    const questionDisplay = document.getElementById('questionDisplay');
    const optionsContainer = document.getElementById('optionsContainer');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');

    const feedbackExplication = document.getElementById('feedbackExplication');

    // ========== FUNÇÕES ==========
    function getSubdisciplines(area) {
      const areaData = bank[area];
      if (!areaData) return [];
      return Object.keys(areaData);
    }

    function getQuestions(area, sub) {
      const areaData = bank[area];
      if (!areaData) return [];
      return areaData[sub] || [];
    }

    function renderSubButtons(area) {
      const subs = getSubdisciplines(area);
      subGrid.innerHTML = '<span class="sub-grid-label">📌 Matéria:</span>';
      if (subs.length === 0) {
        const span = document.createElement('span');
        span.textContent = 'Nenhuma matéria disponível';
        span.style.color = '#6f8fa0';
        subGrid.appendChild(span);
        return;
      }
      subs.forEach(sub => {
        const btn = document.createElement('button');
        btn.className = 'sub-btn';
        btn.textContent = sub;
        btn.dataset.sub = sub;
        if (sub === currentSub) btn.classList.add('active-sub');
        btn.addEventListener('click', function() {
          const newSub = this.dataset.sub;
          if (newSub !== currentSub) {
            currentSub = newSub;
            loadSubject(currentArea, currentSub);
          }
        });
        subGrid.appendChild(btn);
      });
    }

    function loadSubject(area, sub) {
      currentArea = area;
      currentSub = sub;
      questions = getQuestions(area, sub);
      currentIndex = 0;
      answered = false;
      renderQuestion();
      updateActiveButtons();
      clearFeedback();
      if (questions.length > 0) {
        counterSpan.textContent = `1 / ${questions.length}`;
      } else {
        counterSpan.textContent = '0 / 0';
      }
    }

    function renderQuestion() {
      if (!questions || questions.length === 0) {
        questionDisplay.textContent = 'Nenhuma pergunta disponível para esta matéria.';
        optionsContainer.innerHTML = '';
        return;
      }
      const q = questions[currentIndex];
      questionDisplay.textContent = q.pergunta;
      optionsContainer.innerHTML = '';
      q.opcoes.forEach((texto, idx) => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.dataset.index = idx;
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'questionOption';
        radio.value = idx;
        radio.id = `opt_${idx}`;
        const label = document.createElement('label');
        label.htmlFor = `opt_${idx}`;
        label.textContent = texto;
        div.appendChild(radio);
        div.appendChild(label);
        optionsContainer.appendChild(div);

        // Ao clicar na opção, verifica automaticamente
        div.addEventListener('click', function(e) {
          // Se já respondeu, não faz nada
          if (answered) return;
          
          const radio = this.querySelector('input[type="radio"]');
          if (radio) {
            radio.checked = true;
            // Dispara a verificação automática
            autoCheckAnswer(idx);
          }
        });

        // Também escuta o change do radio
        radio.addEventListener('change', function() {
          if (answered) return;
          if (this.checked) {
            autoCheckAnswer(idx);
          }
        });
      });
      // Limpa seleção
      const radios = document.querySelectorAll('input[name="questionOption"]');
      radios.forEach(r => r.checked = false);
      answered = false;
      if (questions.length > 0) {
        counterSpan.textContent = `${currentIndex+1} / ${questions.length}`;
      }
      clearFeedback();
      // Remove classes de cores
      document.querySelectorAll('.option-item').forEach(el => {
        el.classList.remove('correct', 'wrong', 'show-correct', 'disabled');
        const radio = el.querySelector('input[type="radio"]');
        if (radio) radio.disabled = false;
      });
    }

    function autoCheckAnswer(selectedIdx) {
      if (answered) return;
      if (!questions || questions.length === 0) return;
      
      const q = questions[currentIndex];
      const isCorrect = (selectedIdx === q.correta);
      const correctText = q.opcoes[q.correta];

      answered = true;

      // Aplicar cores nas opções
      const allOptions = document.querySelectorAll('.option-item');
      allOptions.forEach((el, i) => {
        el.classList.add('disabled');
        const radio = el.querySelector('input[type="radio"]');
        if (radio) radio.disabled = true;
        if (i === q.correta) {
          el.classList.add('show-correct');
        }
        if (i === selectedIdx && !isCorrect) {
          el.classList.add('wrong');
        }
        if (i === selectedIdx && isCorrect) {
          el.classList.add('correct');
        }
      });

      // Feedback
      const badge = document.createElement('span');
      badge.className = `feedback-badge ${isCorrect ? 'acertou' : 'errou'}`;
      badge.textContent = isCorrect ? '✅ Acertou!' : '❌ Errou!';
      const oldBadge = document.querySelector('.feedback-badge');
      if (oldBadge) oldBadge.remove();

      feedbackEmoji.textContent = isCorrect ? '🎉' : '😓';
      feedbackMessage.innerHTML = '';
      feedbackMessage.appendChild(badge);
      const correctSpan = document.createElement('span');
      correctSpan.className = 'feedback-correct';
      correctSpan.textContent = `Resposta correta: ${correctText}`;
      feedbackMessage.appendChild(correctSpan);

      feedbackExplication.style.display = 'block';
      feedbackExplication.innerHTML = `<strong>💬 Explicação:</strong> ${q.explicacao}`;
    }

    function clearFeedback() {
      feedbackEmoji.textContent = '💡';
      feedbackMessage.textContent = 'Clique em uma alternativa para responder';
      feedbackExplication.style.display = 'none';
      feedbackExplication.innerHTML = '';
      const badge = document.querySelector('.feedback-badge');
      if (badge) badge.remove();
    }

    function updateActiveButtons() {
      disciplineBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.area === currentArea) btn.classList.add('active');
      });
      const subBtns = subGrid.querySelectorAll('.sub-btn');
      subBtns.forEach(btn => {
        btn.classList.remove('active-sub');
        if (btn.dataset.sub === currentSub) btn.classList.add('active-sub');
      });
    }

    function nextQuestion() {
      if (!questions || questions.length === 0) return;
      let next = currentIndex + 1;
      if (next >= questions.length) next = 0;
      currentIndex = next;
      answered = false;
      renderQuestion();
      clearFeedback();
      const oldBadge = document.querySelector('.feedback-badge');
      if (oldBadge) oldBadge.remove();
      feedbackExplication.style.display = 'none';
      feedbackMessage.textContent = 'Clique em uma alternativa para responder';
      feedbackEmoji.textContent = '💡';
      counterSpan.textContent = `${currentIndex+1} / ${questions.length}`;
    }

    function resetQuiz() {
      loadSubject(currentArea, currentSub);
      clearFeedback();
      const oldBadge = document.querySelector('.feedback-badge');
      if (oldBadge) oldBadge.remove();
      feedbackExplication.style.display = 'none';
      feedbackMessage.textContent = '🔁 Quiz reiniciado. Clique em uma alternativa.';
      feedbackEmoji.textContent = '💡';
    }

    // ========== EVENTOS ==========
    disciplineBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        const area = this.dataset.area;
        if (area !== currentArea) {
          currentArea = area;
          const subs = getSubdisciplines(area);
          if (subs.length > 0) {
            currentSub = subs[0];
          } else {
            currentSub = '';
          }
          renderSubButtons(area);
          loadSubject(currentArea, currentSub);
          clearFeedback();
          const oldBadge = document.querySelector('.feedback-badge');
          if (oldBadge) oldBadge.remove();
          feedbackExplication.style.display = 'none';
          feedbackMessage.textContent = `📚 Área ${area.charAt(0).toUpperCase()+area.slice(1)} selecionada.`;
        }
      });
    });

    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);

    // ========== INICIALIZA ==========
    currentArea = 'linguagens';
    currentSub = 'Língua Portuguesa';
    renderSubButtons(currentArea);
    loadSubject(currentArea, currentSub);
    updateActiveButtons();
    feedbackMessage.textContent = '📌 Clique em uma alternativa para responder automaticamente.';
  })();
</script>
</body>
</html>
