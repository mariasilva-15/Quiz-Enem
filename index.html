<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ENEM - Supabase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .label {
            color: #718096;
            font-size: 0.9em;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filters select, .filters button {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            flex: 1;
            min-width: 150px;
        }

        .filters button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            flex: 0.5;
        }

        .filters button:hover {
            background: #5a67d8;
        }

        .question-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .question-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-number {
            font-weight: bold;
            color: #667eea;
            font-size: 0.9em;
        }

        .question-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            color: white;
        }

        .tag-materia { background: #4299e1; }
        .tag-area { background: #48bb78; }
        .tag-dificuldade { background: #ed8936; }

        .question-text {
            font-size: 1.1em;
            color: #2d3748;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f7fafc;
        }

        .option.selected {
            border-color: #667eea;
            background: #ebf4ff;
        }

        .option.correct {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .option.wrong {
            border-color: #fc8181;
            background: #fff5f5;
        }

        .option-letter {
            font-weight: bold;
            color: #4a5568;
            min-width: 25px;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #4299e1;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation strong {
            color: #2b6cb0;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .controls button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:hover:not(.active) {
            border-color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #718096;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .error {
            background: #fff5f5;
            border: 2px solid #fc8181;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .filters {
                flex-direction: column;
            }

            .filters select, .filters button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Quiz ENEM</h1>
        <p class="subtitle">Teste seus conhecimentos com perguntas do ENEM</p>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="number" id="totalQuestions">0</div>
                <div class="label">Total de Perguntas</div>
            </div>
            <div class="stat-item">
                <div class="number" id="answeredQuestions">0</div>
                <div class="label">Respondidas</div>
            </div>
            <div class="stat-item">
                <div class="number" id="correctAnswers">0</div>
                <div class="label">Acertos</div>
            </div>
            <div class="stat-item">
                <div class="number" id="hitRate">0%</div>
                <div class="label">Taxa de Acerto</div>
            </div>
        </div>

        <div class="filters">
            <select id="areaFilter">
                <option value="">Todas as Áreas</option>
                <option value="Linguagens, Códigos e suas Tecnologias">Linguagens</option>
                <option value="Ciências Humanas e suas Tecnologias">Ciências Humanas</option>
                <option value="Ciências da Natureza e suas Tecnologias">Ciências da Natureza</option>
                <option value="Matemática e suas Tecnologias">Matemática</option>
            </select>

            <select id="materiaFilter">
                <option value="">Todas as Matérias</option>
            </select>

            <select id="dificuldadeFilter">
                <option value="">Todas as Dificuldades</option>
                <option value="Fácil">Fácil</option>
                <option value="Médio">Médio</option>
                <option value="Difícil">Difícil</option>
            </select>

            <button onclick="loadQuestions()">🔍 Buscar</button>
            <button onclick="resetQuiz()" class="btn-secondary">🔄 Reiniciar</button>
        </div>

        <div id="questionsContainer">
            <div class="loading">Carregando perguntas</div>
        </div>

        <div class="controls">
            <button onclick="previousPage()" class="btn-secondary" id="prevBtn">⬅ Anterior</button>
            <button onclick="nextPage()" class="btn-primary" id="nextBtn">Próxima ➡</button>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO DO SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://yhphfgidtopoqzaoemtr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_YX1L7YhdyX5wwDWPFqfBZQ_oPfnBpGm';

        // ============================================
        // SQL PARA CRIAR A TABELA (executar no Supabase SQL Editor)
        // ============================================
        const SQL_CREATE_TABLE = `
        -- Tabela principal de perguntas do quiz ENEM
        CREATE TABLE IF NOT EXISTS perguntas_quiz (
            id BIGINT PRIMARY KEY GENERATED ALWAYS AS IDENTITY,
            materia VARCHAR(100) NOT NULL,
            area_conhecimento VARCHAR(100) NOT NULL,
            sub_tema VARCHAR(100),
            pergunta TEXT NOT NULL,
            opcao_a TEXT NOT NULL,
            opcao_b TEXT NOT NULL,
            opcao_c TEXT NOT NULL,
            opcao_d TEXT NOT NULL,
            opcao_e TEXT NOT NULL,
            resposta_correta CHAR(1) NOT NULL CHECK (resposta_correta IN ('A', 'B', 'C', 'D', 'E')),
            explicacao TEXT,
            ano_enem INTEGER,
            dificuldade VARCHAR(20) CHECK (dificuldade IN ('Fácil', 'Médio', 'Difícil')),
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
        );

        -- Índices para melhorar performance das buscas
        CREATE INDEX IF NOT EXISTS idx_perguntas_materia ON perguntas_quiz(materia);
        CREATE INDEX IF NOT EXISTS idx_perguntas_area ON perguntas_quiz(area_conhecimento);
        CREATE INDEX IF NOT EXISTS idx_perguntas_sub_tema ON perguntas_quiz(sub_tema);
        CREATE INDEX IF NOT EXISTS idx_perguntas_dificuldade ON perguntas_quiz(dificuldade);

        -- Trigger para atualizar o updated_at automaticamente
        CREATE OR REPLACE FUNCTION update_updated_at_column()
        RETURNS TRIGGER AS $$
        BEGIN
            NEW.updated_at = CURRENT_TIMESTAMP;
            RETURN NEW;
        END;
        $$ language 'plpgsql';

        DROP TRIGGER IF EXISTS update_perguntas_updated_at ON perguntas_quiz;
        CREATE TRIGGER update_perguntas_updated_at 
            BEFORE UPDATE ON perguntas_quiz 
            FOR EACH ROW 
            EXECUTE FUNCTION update_updated_at_column();

        -- Tabela para estatísticas de respostas dos usuários
        CREATE TABLE IF NOT EXISTS respostas_usuarios (
            id BIGINT PRIMARY KEY GENERATED ALWAYS AS IDENTITY,
            pergunta_id BIGINT REFERENCES perguntas_quiz(id) ON DELETE CASCADE,
            usuario_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
            resposta_usuario CHAR(1) CHECK (resposta_usuario IN ('A', 'B', 'C', 'D', 'E')),
            correta BOOLEAN,
            tempo_resposta INTEGER,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            UNIQUE(pergunta_id, usuario_id)
        );

        CREATE INDEX IF NOT EXISTS idx_respostas_usuario ON respostas_usuarios(usuario_id);
        CREATE INDEX IF NOT EXISTS idx_respostas_pergunta ON respostas_usuarios(pergunta_id);

        -- Função para buscar perguntas
        CREATE OR REPLACE FUNCTION buscar_perguntas(
            p_area VARCHAR DEFAULT NULL,
            p_materia VARCHAR DEFAULT NULL,
            p_sub_tema VARCHAR DEFAULT NULL,
            p_quantidade INTEGER DEFAULT 10
        )
        RETURNS SETOF perguntas_quiz AS $$
        BEGIN
            RETURN QUERY
            SELECT *
            FROM perguntas_quiz
            WHERE (p_area IS NULL OR area_conhecimento = p_area)
                AND (p_materia IS NULL OR materia = p_materia)
                AND (p_sub_tema IS NULL OR sub_tema = p_sub_tema)
            ORDER BY RANDOM()
            LIMIT p_quantidade;
        END;
        $$ LANGUAGE plpgsql;
        `;

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let allQuestions = [];
        let filteredQuestions = [];
        let currentPage = 0;
        const QUESTIONS_PER_PAGE = 5;
        let userAnswers = {};
        let questionStatus = {};

        // ============================================
        // FUNÇÕES PRINCIPAIS
        // ============================================

        // Carregar perguntas do Supabase
        async function loadQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '<div class="loading">Carregando perguntas</div>';

            try {
                const area = document.getElementById('areaFilter').value;
                const materia = document.getElementById('materiaFilter').value;
                const dificuldade = document.getElementById('dificuldadeFilter').value;

                let url = `${SUPABASE_URL}/rest/v1/perguntas_quiz?select=*`;

                const conditions = [];
                if (area) conditions.push(`area_conhecimento=eq.${encodeURIComponent(area)}`);
                if (materia) conditions.push(`materia=eq.${encodeURIComponent(materia)}`);
                if (dificuldade) conditions.push(`dificuldade=eq.${dificuldade}`);

                if (conditions.length > 0) {
                    url += `&${conditions.join('&')}`;
                }

                const response = await fetch(url, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    // Se a tabela não existe, mostrar instrução para criar
                    if (response.status === 404) {
                        container.innerHTML = `
                            <div class="error">
                                <strong>⚠️ Tabela não encontrada!</strong>
                                <p>Você precisa criar a tabela no Supabase primeiro.</p>
                                <p>Execute o seguinte SQL no SQL Editor do Supabase:</p>
                                <pre style="background:#f7fafc;padding:15px;border-radius:8px;overflow:auto;font-size:0.8em;max-height:300px;">${SQL_CREATE_TABLE}</pre>
                                <button onclick="loadQuestions()" class="btn-primary" style="margin-top:15px;">Tentar novamente</button>
                            </div>
                        `;
                        return;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                allQuestions = await response.json();
                filteredQuestions = [...allQuestions];
                
                if (filteredQuestions.length === 0) {
                    container.innerHTML = `
                        <div class="error">
                            <strong>📭 Nenhuma pergunta encontrada!</strong>
                            <p>Por favor, insira algumas perguntas no banco de dados.</p>
                            <button onclick="loadQuestions()" class="btn-primary" style="margin-top:15px;">Tentar novamente</button>
                        </div>
                    `;
                    return;
                }

                currentPage = 0;
                renderQuestions();
                updateStats();
                updatePagination();

            } catch (error) {
                console.error('Erro ao carregar perguntas:', error);
                container.innerHTML = `
                    <div class="error">
                        <strong>❌ Erro ao carregar perguntas:</strong>
                        <p>${error.message}</p>
                        <button onclick="loadQuestions()" class="btn-primary" style="margin-top:15px;">Tentar novamente</button>
                    </div>
                `;
            }
        }

        // Renderizar perguntas da página atual
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const start = currentPage * QUESTIONS_PER_PAGE;
            const end = Math.min(start + QUESTIONS_PER_PAGE, filteredQuestions.length);
            const pageQuestions = filteredQuestions.slice(start, end);

            if (pageQuestions.length === 0) {
                container.innerHTML = '<div class="loading">Nenhuma pergunta encontrada</div>';
                return;
            }

            let html = '';
            pageQuestions.forEach((q, index) => {
                const globalIndex = start + index;
                const status = questionStatus[globalIndex] || {};
                const isAnswered = status.answered || false;
                const isCorrect = status.correct || false;
                const selectedOption = status.selected || null;

                html += `
                    <div class="question-card" id="question-${globalIndex}">
                        <div class="question-header">
                            <span class="question-number">Pergunta ${globalIndex + 1} de ${filteredQuestions.length}</span>
                            <div class="question-tags">
                                <span class="tag tag-materia">${q.materia}</span>
                                <span class="tag tag-area">${q.area_conhecimento}</span>
                                <span class="tag tag-dificuldade">${q.dificuldade || 'Médio'}</span>
                            </div>
                        </div>
                        <div class="question-text">${q.pergunta}</div>
                        <div class="options">
                            ${['A', 'B', 'C', 'D', 'E'].map(letter => {
                                const optionText = q[`opcao_${letter.toLowerCase()}`];
                                const isSelected = selectedOption === letter;
                                const isCorrectOption = q.resposta_correta === letter;
                                let classes = 'option';
                                if (isAnswered) {
                                    classes += ' disabled';
                                    if (isSelected && isCorrectOption) classes += ' correct';
                                    else if (isSelected && !isCorrectOption) classes += ' wrong';
                                    else if (isCorrectOption) classes += ' correct';
                                } else if (isSelected) {
                                    classes += ' selected';
                                }
                                return `
                                    <div class="${classes}" onclick="${!isAnswered ? `selectOption(${globalIndex}, '${letter}')` : ''}">
                                        <span class="option-letter">${letter}.</span>
                                        <span>${optionText || ''}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="explanation ${isAnswered ? 'show' : ''}" id="explanation-${globalIndex}">
                            <strong>💡 Explicação:</strong><br>
                            ${q.explicacao || 'Explicação não disponível.'}<br>
                            <strong>✅ Resposta correta: ${q.resposta_correta}</strong>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            updateStats();
            updatePagination();
            updateButtons();
        }

        // Selecionar uma opção
        function selectOption(index, letter) {
            if (questionStatus[index] && questionStatus[index].answered) return;

            const question = filteredQuestions[index];
            const isCorrect = question.resposta_correta === letter;

            questionStatus[index] = {
                answered: true,
                selected: letter,
                correct: isCorrect
            };

            // Salvar resposta no Supabase (opcional)
            saveAnswer(index, letter, isCorrect);

            renderQuestions();
            updateStats();
        }

        // Salvar resposta no Supabase
        async function saveAnswer(index, letter, isCorrect) {
            const question = filteredQuestions[index];
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/respostas_usuarios`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        pergunta_id: question.id,
                        resposta_usuario: letter,
                        correta: isCorrect,
                        tempo_resposta: 0
                    })
                });
            } catch (error) {
                console.error('Erro ao salvar resposta:', error);
            }
        }

        // Atualizar estatísticas
        function updateStats() {
            const total = filteredQuestions.length;
            const answered = Object.values(questionStatus).filter(s => s.answered).length;
            const correct = Object.values(questionStatus).filter(s => s.answered && s.correct).length;
            const hitRate = answered > 0 ? Math.round((correct / answered) * 100) : 0;

            document.getElementById('totalQuestions').textContent = total;
            document.getElementById('answeredQuestions').textContent = answered;
            document.getElementById('correctAnswers').textContent = correct;
            document.getElementById('hitRate').textContent = `${hitRate}%`;
        }

        // Atualizar paginação
        function updatePagination() {
            const totalPages = Math.ceil(filteredQuestions.length / QUESTIONS_PER_PAGE);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i + 1}</button>`;
            }
            pagination.innerHTML = html;
        }

        // Atualizar botões de navegação
        function updateButtons() {
            const totalPages = Math.ceil(filteredQuestions.length / QUESTIONS_PER_PAGE);
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
        }

        // Navegação
        function goToPage(page) {
            currentPage = page;
            renderQuestions();
        }

        function previousPage() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredQuestions.length / QUESTIONS_PER_PAGE);
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderQuestions();
            }
        }

        // Resetar quiz
        function resetQuiz() {
            if (confirm('Tem certeza que deseja reiniciar o quiz? Todas as respostas serão perdidas.')) {
                questionStatus = {};
                renderQuestions();
                updateStats();
            }
        }

        // Carregar matérias para o filtro
        async function loadMaterias() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/perguntas_quiz?select=materia`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) return;

                const data = await response.json();
                const materias = [...new Set(data.map(q => q.materia))];
                const select = document.getElementById('materiaFilter');
                
                // Manter a opção "Todas"
                const currentValue = select.value;
                select.innerHTML = '<option value="">Todas as Matérias</option>';
                materias.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m;
                    option.textContent = m;
                    select.appendChild(option);
                });
                select.value = currentValue;

            } catch (error) {
                console.error('Erro ao carregar matérias:', error);
            }
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadMaterias();
            loadQuestions();
        });

        // Mostrar SQL de criação quando a tabela não existe
        console.log('SQL para criar a tabela no Supabase:');
        console.log(SQL_CREATE_TABLE);
    </script>
</body>
</html>
