<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IME QUIZ · Enem</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e3f2fd 0%, #b3d9f0 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      max-width: 1100px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 25px 50px rgba(0, 60, 100, 0.20), 0 8px 20px rgba(0, 40, 70, 0.08);
      padding: 2.5rem 2.8rem;
      border: 1px solid rgba(180, 215, 240, 0.4);
      transition: box-shadow 0.3s ease;
    }

    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand h1 {
      font-size: 3.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0b4b6b 0%, #2a7fa0 80%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      padding: 0 0.5rem;
      border-bottom: 4px solid #a0d0e9;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }
    .brand h1 small {
      font-size: 1.2rem;
      font-weight: 300;
      -webkit-text-fill-color: #3b7a9a;
      margin-left: 10px;
      letter-spacing: 2px;
    }

    .nav-area {
      margin-bottom: 2rem;
    }
    .discipline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .discipline-btn {
      background: #f0f9ff;
      border: 2px solid #c5e0f0;
      border-radius: 60px;
      padding: 0.75rem 0.3rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #063f58;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .discipline-btn:hover {
      background: #dcecf7;
      border-color: #6faecf;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(30, 130, 180, 0.12);
    }
    .discipline-btn.active {
      background: #c7e5f5;
      border-color: #3f8fb5;
      box-shadow: 0 6px 14px rgba(30, 130, 180, 0.20);
      transform: translateY(-2px);
    }

    .sub-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
      background: #f5fafe;
      padding: 0.8rem 1.4rem;
      border-radius: 60px;
      border: 1px solid #d6eaf5;
      margin-top: 0.3rem;
      min-height: 3.4rem;
      align-items: center;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .sub-grid-label {
      font-weight: 600;
      color: #1a5e7a;
      margin-right: 0.5rem;
      font-size: 0.95rem;
    }
    .sub-btn {
      background: transparent;
      border: 2px solid transparent;
      border-radius: 40px;
      padding: 0.35rem 1.4rem;
      font-weight: 500;
      font-size: 0.9rem;
      color: #144f6b;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .sub-btn:hover {
      background: #e0eff9;
      border-color: #95c2db;
      transform: scale(1.03);
    }
    .sub-btn.active-sub {
      background: #c7e5f5;
      border-color: #3f8fb5;
      font-weight: 600;
      color: #043e55;
      box-shadow: 0 2px 8px rgba(30, 130, 180, 0.12);
    }

    .question-card {
      background: #fafffe;
      border-radius: 36px;
      padding: 2rem 2.4rem;
      margin-bottom: 1.8rem;
      border: 1px solid #d6eaf5;
      box-shadow: 0 6px 18px rgba(30, 100, 140, 0.06);
      transition: box-shadow 0.3s ease;
    }
    .question-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0b4058;
      line-height: 1.5;
      margin-bottom: 1.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px dashed #b8d8ec;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .option-item {
      background: #f5fbfe;
      border-radius: 40px;
      border: 2px solid #d2e6f2;
      padding: 0.9rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .option-item:hover:not(.disabled) {
      background: #e9f4fc;
      border-color: #8ac0db;
      transform: translateX(4px);
    }
    .option-item.disabled {
      cursor: default;
      opacity: 0.85;
    }
    .option-item input[type="radio"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #1585b3;
      cursor: pointer;
      flex-shrink: 0;
    }
    .option-item.disabled input[type="radio"] {
      cursor: default;
    }
    .option-item label {
      font-size: 1.1rem;
      font-weight: 500;
      color: #144f6b;
      cursor: pointer;
      flex: 1;
    }
    .option-item.disabled label {
      cursor: default;
    }

    /* cores de feedback */
    .option-item.correct {
      background: #d4edda;
      border-color: #28a745;
      box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
    }
    .option-item.wrong {
      background: #f8d7da;
      border-color: #dc3545;
      box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.2);
    }
    .option-item.correct-display {
      background: #d4edda;
      border-color: #28a745;
      box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      margin-top: 0.4rem;
    }
    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: #c7e5f5;
      border: none;
      border-radius: 60px;
      padding: 0.75rem 2.2rem;
      font-weight: 600;
      font-size: 1rem;
      color: #063f58;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid #a2cde3;
      box-shadow: 0 4px 10px rgba(0, 70, 120, 0.06);
    }
    .btn-primary:hover {
      background: #b3daf0;
      border-color: #66aaca;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(30, 130, 180, 0.15);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-check {
      background: #0b6f94;
      border: none;
      padding: 0.75rem 2.4rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 16px rgba(10, 90, 130, 0.25);
      border: 1px solid #479bc0;
    }
    .btn-check:hover {
      background: #0a6183;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(10, 90, 130, 0.30);
    }
    .btn-check:active {
      transform: translateY(0);
    }
    .btn-check:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none;
    }
    .btn-reset {
      background: transparent;
      border: 2px solid #98c5dd;
      padding: 0.65rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      color: #1a5d79;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-reset:hover {
      background: #e5f1f9;
      border-color: #589fc0;
      transform: translateY(-2px);
    }
    .counter {
      font-size: 0.95rem;
      color: #2f7897;
      font-weight: 500;
      background: #eaf4fa;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
    }

    .feedback-box {
      margin-top: 1.8rem;
      padding: 1.2rem 2rem;
      border-radius: 60px;
      background: #e6f2fa;
      border-left: 8px solid #3f95bb;
      font-size: 1.05rem;
      font-weight: 500;
      color: #04415a;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
      transition: all 0.3s ease;
    }
    .feedback-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .feedback-badge {
      font-weight: 700;
      padding: 0.2rem 1.6rem;
      border-radius: 40px;
      background: #b3d9ec;
    }
    .feedback-badge.acertou {
      background: #b2e0c0;
      color: #06653b;
    }
    .feedback-badge.errou {
      background: #fad1d1;
      color: #a12222;
    }
    .feedback-correct {
      background: #d9ecf5;
      padding: 0.15rem 1.4rem;
      border-radius: 40px;
      font-weight: 600;
      color: #025074;
    }
    .feedback-explication {
      background: #f2f9ff;
      padding: 0.8rem 1.6rem;
      border-radius: 30px;
      font-weight: 400;
      color: #013249;
      border-left: 4px solid #5ba3c7;
      margin-top: 0.2rem;
      font-size: 0.98rem;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    @media (max-width: 650px) {
      .app { padding: 1.8rem 1.2rem; }
      .brand h1 { font-size: 2.4rem; }
      .question-text { font-size: 1.25rem; }
      .discipline-grid { grid-template-columns: repeat(2, 1fr); }
      .sub-grid { flex-direction: column; align-items: stretch; gap: 0.3rem; }
      .option-item { padding: 0.7rem 1rem; }
      .feedback-box { padding: 1rem 1.2rem; }
    }
    @media (max-width: 420px) {
      .brand h1 { font-size: 2rem; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .btn-group { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <div class="brand">
    <h1>IME QUIZ <small>Enem</small></h1>
  </div>

  <div class="nav-area">
    <div class="discipline-grid" id="disciplineGrid">
      <button class="discipline-btn" data-area="linguagens">📖 Linguagens</button>
      <button class="discipline-btn" data-area="humanas">🌍 Humanas</button>
      <button class="discipline-btn" data-area="natureza">🔬 Natureza</button>
      <button class="discipline-btn" data-area="matematica">📐 Matemática</button>
    </div>
    <div class="sub-grid" id="subGrid">
      <span class="sub-grid-label">📌 Matéria:</span>
    </div>
  </div>

  <div class="question-card">
    <div class="question-text" id="questionDisplay">Selecione uma área e matéria</div>
    <div class="options-grid" id="optionsContainer"></div>
  </div>

  <div class="action-bar">
    <div class="btn-group">
      <button class="btn-check" id="checkBtn">✔ Verificar</button>
      <button class="btn-primary" id="nextBtn">⏩ Próxima</button>
      <button class="btn-reset" id="resetBtn">↻ Reiniciar</button>
    </div>
    <span class="counter" id="counter">0 / 0</span>
  </div>

  <div class="feedback-box" id="feedbackBox">
    <div class="feedback-row">
      <span id="feedbackEmoji">💡</span>
      <span id="feedbackMessage">Escolha uma opção e verifique</span>
    </div>
    <div id="feedbackExplication" class="feedback-explication" style="display: none;"></div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ========== BANCO DE QUESTÕES COM 20 PERGUNTAS POR MATÉRIA ==========
    const bank = {
      linguagens: {
        'Língua Portuguesa': gerarQuestoes('LP', 20),
        'Literatura': gerarQuestoes('LIT', 20),
        'Artes': gerarQuestoes('ART', 20),
        'Educação Física': gerarQuestoes('EF', 20),
        'Inglês': gerarQuestoes('ING', 20),
        'Espanhol': gerarQuestoes('ESP', 20)
      },
      humanas: {
        'História': gerarQuestoes('HIS', 20),
        'Geografia': gerarQuestoes('GEO', 20),
        'Filosofia': gerarQuestoes('FIL', 20),
        'Sociologia': gerarQuestoes('SOC', 20)
      },
      natureza: {
        'Biologia': gerarQuestoes('BIO', 20),
        'Química': gerarQuestoes('QUI', 20),
        'Física': gerarQuestoes('FIS', 20)
      },
      matematica: {
        'Matemática': gerarQuestoes('MAT', 20)
      }
    };

    // Gerador de 20 perguntas por matéria (com temas variados)
    function gerarQuestoes(prefixo, qtd) {
      const perguntas = [];
      const temas = {
        'LP': ['Figuras de linguagem', 'Gêneros textuais', 'Ortografia', 'Sintaxe', 'Interpretação de texto', 'Variação linguística', 'Literatura portuguesa', 'Funções da linguagem', 'Coesão textual', 'Concordância'],
        'LIT': ['Romantismo', 'Realismo', 'Modernismo', 'Barroco', 'Arcadismo', 'Simbolismo', 'Parnasianismo', 'Literatura contemporânea', 'Poesia concreta', 'Literatura de cordel'],
        'ART': ['Renascimento', 'Expressionismo', 'Cubismo', 'Surrealismo', 'Arte moderna', 'Arte contemporânea', 'Graffiti', 'Escultura', 'Fotografia', 'Arte digital'],
        'EF': ['Esportes', 'Alongamento', 'Capoeira', 'Voleibol', 'Basquetebol', 'Natação', 'Futebol', 'Ginástica', 'Atividade física', 'Aquecimento'],
        'ING': ['Verbos', 'Gramática', 'Vocabulário', 'Saudações', 'Tempos verbais', 'Pronomes', 'Advérbios', 'Preposições', 'Conjunções', 'Expressões'],
        'ESP': ['Verbos', 'Gramática', 'Vocabulário', 'Saudações', 'Tempos verbais', 'Pronomes', 'Advérbios', 'Preposições', 'Conjunções', 'Expressões'],
        'HIS': ['Revoluções', 'Guerras', 'Impérios', 'Idade Média', 'Idade Moderna', 'Idade Contemporânea', 'Brasil colonial', 'Ditadura', 'Democracia', 'Globalização'],
        'GEO': ['Clima', 'Biomas', 'Relevo', 'Hidrografia', 'População', 'Urbanização', 'Globalização', 'Agricultura', 'Indústria', 'Meio ambiente'],
        'FIL': ['Ética', 'Política', 'Conhecimento', 'Existencialismo', 'Iluminismo', 'Empirismo', 'Racionalismo', 'Filosofia antiga', 'Filosofia medieval', 'Filosofia moderna'],
        'SOC': ['Estratificação', 'Cultura', 'Trabalho', 'Educação', 'Gênero', 'Raça', 'Globalização', 'Movimentos sociais', 'Ideologia', 'Ação social'],
        'BIO': ['Genética', 'Evolução', 'Ecologia', 'Fisiologia', 'Anatomia', 'Botânica', 'Zoologia', 'Microbiologia', 'Bioquímica', 'Imunologia'],
        'QUI': ['Tabela periódica', 'Ligações', 'Reações', 'Funções', 'Estequiometria', 'Termoquímica', 'Cinética', 'Equilíbrio', 'Radioatividade', 'Polímeros'],
        'FIS': ['Mecânica', 'Termodinâmica', 'Ondas', 'Eletricidade', 'Óptica', 'Cinemática', 'Dinâmica', 'Gravitação', 'Eletromagnetismo', 'Física moderna'],
        'MAT': ['Álgebra', 'Geometria', 'Trigonometria', 'Estatística', 'Funções', 'Polinômios', 'Matrizes', 'Logaritmos', 'Probabilidade', 'Análise combinatória']
      };
      const temaLista = temas[prefixo] || ['Questão geral'];
      for (let i = 0; i < qtd; i++) {
        const tema = temaLista[i % temaLista.length];
        perguntas.push({
          pergunta: `Questão ${i+1} - ${tema}: Assinale a alternativa correta.`,
          opcoes: [
            `Alternativa A (${String.fromCharCode(65+i%10)})`,
            `Alternativa B (${String.fromCharCode(66+i%10)})`,
            `Alternativa C (${String.fromCharCode(67+i%10)})`,
            `Alternativa D (${String.fromCharCode(68+i%10)})`
          ],
          correta: (i + 2) % 4, // varia a correta
          explicacao: `Esta é a explicação para a questão ${i+1} sobre ${tema}. A resposta correta é a ${['A', 'B', 'C', 'D'][(i+2)%4]} porque este é o conceito fundamental abordado.`
        });
      }
      return perguntas;
    }

    // ---------- ESTADO ----------
    let currentArea = 'linguagens';
    let currentSub = 'Língua Portuguesa';
    let questions = [];
    let currentIndex = 0;
    let answered = false;
    let selectedOption = null;

    // DOM
    const disciplineBtns = document.querySelectorAll('.discipline-btn');
    const subGrid = document.getElementById('subGrid');
    const questionDisplay = document.getElementById('questionDisplay');
    const optionsContainer = document.getElementById('optionsContainer');
    const checkBtn = document.getElementById('checkBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const counterSpan = document.getElementById('counter');
    const feedbackEmoji = document.getElementById('feedbackEmoji');
    const feedbackMessage = document.getElementById('feedbackMessage');
    const feedbackExplication = document.getElementById('feedbackExplication');

    // ---------- FUNÇÕES ----------
    function getSubdisciplines(area) {
      const areaData = bank[area];
      if (!areaData) return [];
      return Object.keys(areaData);
    }

    function getQuestions(area, sub) {
      const areaData = bank[area];
      if (!areaData) return [];
      return areaData[sub] || [];
    }

    function renderSubButtons(area) {
      const subs = getSubdisciplines(area);
      subGrid.innerHTML = '<span class="sub-grid-label">📌 Matéria:</span>';
      if (subs.length === 0) {
        const span = document.createElement('span');
        span.textContent = 'Nenhuma matéria disponível';
        span.style.color = '#6f8fa0';
        subGrid.appendChild(span);
        return;
      }
      subs.forEach(sub => {
        const btn = document.createElement('button');
        btn.className = 'sub-btn';
        btn.textContent = sub;
        btn.dataset.sub = sub;
        if (sub === currentSub) btn.classList.add('active-sub');
        btn.addEventListener('click', function() {
          const newSub = this.dataset.sub;
          if (newSub !== currentSub) {
            currentSub = newSub;
            loadSubject(currentArea, currentSub);
          }
        });
        subGrid.appendChild(btn);
      });
    }

    function loadSubject(area, sub) {
      currentArea = area;
      currentSub = sub;
      questions = getQuestions(area, sub);
      currentIndex = 0;
      answered = false;
      selectedOption = null;
      renderQuestion();
      updateActiveButtons();
      clearFeedback();
      if (questions.length > 0) {
        counterSpan.textContent = `1 / ${questions.length}`;
      } else {
        counterSpan.textContent = '0 / 0';
      }
      checkBtn.disabled = false;
    }

    function renderQuestion() {
      if (!questions || questions.length === 0) {
        questionDisplay.textContent = 'Nenhuma pergunta disponível para esta matéria.';
        optionsContainer.innerHTML = '';
        return;
      }
      const q = questions[currentIndex];
      questionDisplay.textContent = q.pergunta;
      optionsContainer.innerHTML = '';
      q.opcoes.forEach((texto, idx) => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.dataset.index = idx;
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'questionOption';
        radio.value = idx;
        radio.id = `opt_${idx}`;
        const label = document.createElement('label');
        label.htmlFor = `opt_${idx}`;
        label.textContent = texto;
        div.appendChild(radio);
        div.appendChild(label);
        optionsContainer.appendChild(div);

        radio.addEventListener('change', function() {
          if (answered) {
            // se já respondeu, ao mudar a opção, reseta o estado de resposta
            answered = false;
            clearFeedback();
            // remove classes de cores das opções
            document.querySelectorAll('.option-item').forEach(el => {
              el.classList.remove('correct', 'wrong', 'correct-display', 'disabled');
            });
            checkBtn.disabled = false;
          }
          selectedOption = idx;
        });
      });
      // limpa seleção
      const radios = document.querySelectorAll('input[name="questionOption"]');
      radios.forEach(r => r.checked = false);
      selectedOption = null;
      answered = false;
      if (questions.length > 0) {
        counterSpan.textContent = `${currentIndex+1} / ${questions.length}`;
      }
      clearFeedback();
      checkBtn.disabled = false;
    }

    function clearFeedback() {
      feedbackEmoji.textContent = '💡';
      feedbackMessage.textContent = 'Escolha uma opção e verifique';
      feedbackExplication.style.display = 'none';
      feedbackExplication.innerHTML = '';
      const badge = document.querySelector('.feedback-badge');
      if (badge) badge.remove();
    }

    function updateActiveButtons() {
      disciplineBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.area === currentArea) btn.classList.add('active');
      });
      const subBtns = subGrid.querySelectorAll('.sub-btn');
      subBtns.forEach(btn => {
        btn.classList.remove('active-sub');
        if (btn.dataset.sub === currentSub) btn.classList.add('active-sub');
      });
    }

    function checkAnswer() {
      if (!questions || questions.length === 0) return;
      if (answered) {
        feedbackMessage.textContent = '⚠️ Você já verificou esta questão. Clique em "Próxima" para continuar.';
        return;
      }
      const selectedRadio = document.querySelector('input[name="questionOption"]:checked');
      if (!selectedRadio) {
        feedbackMessage.textContent = '⚠️ Selecione uma alternativa primeiro.';
        return;
      }
      const idx = parseInt(selectedRadio.value, 10);
      if (isNaN(idx)) return;

      const q = questions[currentIndex];
      const isCorrect = (idx === q.correta);
      const correctText = q.opcoes[q.correta];

      answered = true;
      selectedOption = idx;
      checkBtn.disabled = true;

      // Aplicar cores nas opções
      const allOptions = document.querySelectorAll('.option-item');
      allOptions.forEach((el, i) => {
        el.classList.add('disabled');
        if (i === q.correta) {
          el.classList.add('correct-display');
        }
        if (i === idx && !isCorrect) {
          el.classList.add('wrong');
        }
        if (i === idx && isCorrect) {
          el.classList.add('correct');
        }
        // desabilita radio
        const radio = el.querySelector('input[type="radio"]');
        if (radio) radio.disabled = true;
      });

      const badge = document.createElement('span');
      badge.className = `feedback-badge ${isCorrect ? 'acertou' : 'errou'}`;
      badge.textContent = isCorrect ? '✅ Acertou!' : '❌ Errou!';
      const oldBadge = document.querySelector('.feedback-badge');
      if (oldBadge) oldBadge.remove();

      feedbackEmoji.textContent = isCorrect ? '🎉' : '😓';
      feedbackMessage.innerHTML = '';
      feedbackMessage.appendChild(badge);
      const correctSpan = document.createElement('span');
      correctSpan.className = 'feedback-correct';
      correctSpan.textContent = `Resposta correta: ${correctText}`;
      feedbackMessage.appendChild(correctSpan);

      feedbackExplication.style.display = 'block';
      feedbackExplication.innerHTML = `<strong>💬 Explicação:</strong> ${q.explicacao}`;
    }

    function nextQuestion() {
      if (!questions || questions.length === 0) return;
      let next = currentIndex + 1;
      if (next >= questions.length) next = 0;
      currentIndex = next;
      answered = false;
      selectedOption = null;
      renderQuestion();
      // reabilitar radios
      document.querySelectorAll('.option-item').forEach(el => {
        el.classList.remove('correct', 'wrong', 'correct-display', 'disabled');
        const radio = el.querySelector('input[type="radio"]');
        if (radio) radio.disabled = false;
      });
      clearFeedback();
      const oldBadge = document.querySelector('.feedback-badge');
      if (oldBadge) oldBadge.remove();
      feedbackExplication.style.display = 'none';
      feedbackMessage.textContent = '📌 Nova pergunta. Escolha uma opção.';
      feedbackEmoji.textContent = '💡';
      counterSpan.textContent = `${currentIndex+1} / ${questions.length}`;
      checkBtn.disabled = false;
    }

    function resetQuiz() {
      loadSubject(currentArea, currentSub);
      document.querySelectorAll('.option-item').forEach(el => {
        el.classList.remove('correct', 'wrong', 'correct-display', 'disabled');
        const radio = el.querySelector('input[type="radio"]');
        if (radio) radio.disabled = false;
      });
      clearFeedback();
      const oldBadge = document.querySelector('.feedback-badge');
      if (oldBadge) oldBadge.remove();
      feedbackExplication.style.display = 'none';
      feedbackMessage.textContent = '🔁 Quiz reiniciado.';
      feedbackEmoji.textContent = '💡';
      checkBtn.disabled = false;
    }

    // ---------- EVENTOS ----------
    disciplineBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        const area = this.dataset.area;
        if (area !== currentArea) {
          currentArea = area;
          const subs = getSubdisciplines(area);
          if (subs.length > 0) {
            currentSub = subs[0];
          } else {
            currentSub = '';
          }
          renderSubButtons(area);
          loadSubject(currentArea, currentSub);
          clearFeedback();
          const oldBadge = document.querySelector('.feedback-badge');
          if (oldBadge) oldBadge.remove();
          feedbackExplication.style.display = 'none';
          feedbackMessage.textContent = `📚 Área ${area.charAt(0).toUpperCase()+area.slice(1)} selecionada.`;
          // resetar cores
          document.querySelectorAll('.option-item').forEach(el => {
            el.classList.remove('correct', 'wrong', 'correct-display', 'disabled');
            const radio = el.querySelector('input[type="radio"]');
            if (radio) radio.disabled = false;
          });
          checkBtn.disabled = false;
        }
      });
    });

    checkBtn.addEventListener('click', checkAnswer);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);

    // ---------- INICIALIZA ----------
    currentArea = 'linguagens';
    currentSub = 'Língua Portuguesa';
    renderSubButtons(currentArea);
    loadSubject(currentArea, currentSub);
    updateActiveButtons();
    feedbackMessage.textContent = '📌 Escolha uma matéria específica nas opções acima.';
  })();
</script>
</body>
</html>
